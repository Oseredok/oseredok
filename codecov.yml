codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
    patch:
      default:
        target: auto

comment:
  layout: "reach,diff,flags,files"
  behavior: default

flags:
  backend:
    paths:
      - backend/
  frontend:
    paths:
      - frontend/src/
