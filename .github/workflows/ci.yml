name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET: ci-test-secret
        run: pytest

      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info

  upload-coverage:
    name: Upload coverage
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-artifacts/backend-coverage/coverage.xml,coverage-artifacts/frontend-coverage/lcov.info
          flags: backend,frontend
          fail_ci_if_error: true

      - name: Update coverage badge
        run: python scripts/generate-coverage-badge.py coverage-artifacts/backend-coverage/coverage.xml coverage-artifacts/frontend-coverage/lcov.info .github/badges/coverage.svg

      - name: Commit coverage badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge"
          file_pattern: .github/badges/coverage.svg
          skip_fetch: true
